<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mi Plan · Carla</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F7F2; --card:#FFFFFF; --ink:#22271C; --soft:#7B8272;
    --verde:#3E9142; --verde-deep:#2C6B2F; --verde-tint:#E5F3E5;
    --sol:#F0A81C; --sol-tint:#FCEFCF;
    --agua:#3D9BC1; --agua-tint:#E2F1F8;
    --coral:#E8674A; --coral-tint:#FBE6E0;
    --line:#E8E9E1;
    --r:22px; --shadow:0 2px 10px rgba(34,39,28,.06);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    font-family:"Nunito",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--bg); color:var(--ink);
    font-size:16px; line-height:1.45; font-weight:600;
    padding-bottom:calc(84px + env(safe-area-inset-bottom));
  }
  header{padding:20px 18px 4px;display:flex;align-items:flex-end;justify-content:space-between;gap:10px}
  .hola{font-size:14px;color:var(--soft);font-weight:700}
  h1{font-size:26px;font-weight:900;line-height:1.15}
  .day-badge{font-size:12px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;
    padding:7px 12px;border-radius:999px;white-space:nowrap}
  .day-badge.e{background:var(--coral-tint);color:#B04328}
  .day-badge.d{background:var(--verde-tint);color:var(--verde-deep)}
  main{padding:10px 14px 20px;display:flex;flex-direction:column;gap:12px}

  /* ===== HERO ===== */
  .hero{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);
    padding:18px 16px;display:flex;align-items:center;gap:16px;position:relative;overflow:hidden}
  .hero.fiesta{background:linear-gradient(135deg,#3E9142,#2C6B2F);color:#fff}
  .hero.fiesta .h-msg,.hero.fiesta .h-sub{color:#fff}
  .hero.fiesta .ring-num{color:#fff}
  .ring-wrap{position:relative;width:104px;height:104px;flex:none}
  .ring-wrap svg{transform:rotate(-90deg);display:block}
  .ring-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-weight:900;color:var(--verde-deep)}
  .ring-num b{font-size:26px;line-height:1}
  .ring-num small{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;opacity:.75;font-weight:800}
  .h-txt{flex:1;min-width:0}
  .h-msg{font-size:18px;font-weight:900;line-height:1.25}
  .h-sub{font-size:13px;color:var(--soft);margin-top:3px;font-weight:700}
  .racha{display:inline-flex;align-items:center;gap:5px;margin-top:9px;
    background:var(--sol-tint);color:#9A6A05;font-size:12.5px;font-weight:900;
    padding:5px 11px;border-radius:999px}
  .hero.fiesta .racha{background:rgba(255,255,255,.22);color:#fff}
  .confeti{position:absolute;font-size:20px;top:-24px;animation:caer 1.6s ease-in forwards;pointer-events:none}
  @keyframes caer{to{transform:translateY(180px) rotate(220deg);opacity:0}}

  /* ===== semana dots ===== */
  .dots-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:13px 16px}
  .dots-row{display:flex;justify-content:space-between}
  .dot-col{display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11px;font-weight:800;color:var(--soft)}
  .dot{width:26px;height:26px;border-radius:50%;background:var(--line);display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent}
  .dot.full{background:var(--verde);color:#fff}
  .dot.today{outline:2.5px solid var(--verde);outline-offset:2px}

  /* ===== siguiente paso ===== */
  .next{display:flex;align-items:center;gap:10px;background:var(--ink);color:#fff;
    border-radius:999px;padding:11px 16px;font-weight:800;font-size:14.5px;cursor:pointer;border:none;width:100%}
  .next .fl{margin-left:auto;font-size:17px}

  /* ===== tarjetas grandes ===== */
  .big{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);
    padding:16px;display:flex;gap:13px;align-items:center;cursor:pointer;
    border:2.5px solid transparent;transition:border .15s, background .15s}
  .big .ico{flex:none;width:46px;height:46px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:22px}
  .big .txt{flex:1;min-width:0}
  .big .t-lab{font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--soft)}
  .big .t-body{font-size:14.5px;margin-top:2px}
  .big .ok{flex:none;width:42px;height:42px;border-radius:50%;border:3px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:19px;color:transparent;font-weight:900;transition:all .15s}
  .big.done{border-color:var(--verde);background:var(--verde-tint)}
  .big.done .ok{background:var(--verde);border-color:var(--verde);color:#fff}
  .big.done .t-body{opacity:.55}
  .ico.b1{background:var(--sol-tint)} .ico.b2{background:var(--verde-tint)} .ico.b3{background:#EEE9F7}
  .ico.ent{background:var(--coral-tint)}

  /* ===== agua ===== */
  .agua-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:16px}
  .agua-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .agua-head .t-lab{font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--soft)}
  .agua-count{font-weight:900;color:var(--agua);font-size:17px}
  .glasses{display:flex;gap:8px;flex-wrap:wrap}
  .glass{width:34px;height:46px;border:3px solid var(--agua);border-top:none;
    border-radius:4px 4px 12px 12px;position:relative;cursor:pointer;overflow:hidden;background:#fff}
  .glass::after{content:"";position:absolute;left:0;right:0;bottom:0;height:0;background:var(--agua);opacity:.85;transition:height .2s}
  .glass.full::after{height:100%}
  .agua-note{font-size:12.5px;color:var(--soft);margin-top:10px;font-weight:700}
  .agua-done{color:var(--verde-deep);background:var(--verde-tint);border-radius:10px;padding:7px 10px;font-weight:800}

  /* ===== entreno hoy ===== */
  .ent-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:16px}
  .ent-top{display:flex;align-items:center;gap:12px}
  .exlist{list-style:none;margin-top:12px}
  .exlist li{padding:7px 0;border-bottom:1.5px dashed var(--line);font-size:14.5px;display:flex;justify-content:space-between;gap:10px}
  .exlist li:last-child{border-bottom:none}
  .exlist .reps{color:var(--soft);white-space:nowrap;font-variant-numeric:tabular-nums;font-weight:800}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:16px;
    padding:15px;font-size:16px;font-weight:900;cursor:pointer;background:var(--coral);color:#fff;width:100%;margin-top:14px;
    font-family:inherit;transition:transform .1s}
  .btn:active{transform:scale(.97)}
  .btn.hecho{background:var(--verde)}
  .btn.ghost{background:transparent;border:2.5px solid var(--line);color:var(--ink);padding:11px 14px;width:auto;font-size:14px}

  /* ===== suplementos ===== */
  .sup-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:16px}
  .t-lab-solo{font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);margin-bottom:6px}
  .sup-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1.5px dashed var(--line);font-size:15px}
  .sup-row:last-child{border-bottom:none}
  .toggle{width:50px;height:30px;border-radius:999px;background:var(--line);position:relative;cursor:pointer;flex:none;transition:background .15s}
  .toggle::after{content:"";position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
  .toggle.on{background:var(--verde)}
  .toggle.on::after{left:23px}

  /* ===== nav ===== */
  nav{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1.5px solid var(--line);
    display:flex;padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:50}
  nav button{flex:1;background:none;border:none;font-family:inherit;font-size:11px;font-weight:800;
    color:var(--soft);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 0;border-radius:14px}
  nav button .ic{font-size:21px;line-height:1}
  nav button.act{color:var(--verde-deep);background:var(--verde-tint)}

  /* ===== menú / compra / entreno tabs ===== */
  .wk-tabs{display:flex;gap:7px}
  .wk-tabs button{flex:1;padding:11px 0;border-radius:14px;border:2.5px solid var(--line);background:var(--card);
    font-weight:900;font-size:14px;color:var(--soft);cursor:pointer;font-family:inherit}
  .wk-tabs button.act{background:var(--verde);border-color:var(--verde);color:#fff}
  details{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  summary{list-style:none;cursor:pointer;padding:15px 16px;display:flex;align-items:center;justify-content:space-between;font-weight:900;font-size:15.5px;gap:8px}
  summary::-webkit-details-marker{display:none}
  summary .tag{font-size:11px;font-weight:900;letter-spacing:.05em;text-transform:uppercase;padding:4px 10px;border-radius:999px;white-space:nowrap}
  summary .tag.e{background:var(--coral-tint);color:#B04328}
  summary .tag.d{background:var(--verde-tint);color:var(--verde-deep)}
  details .inner{padding:0 16px 15px;font-size:14.5px;display:flex;flex-direction:column;gap:9px}
  .m-row{display:flex;gap:9px}
  .m-row .ico-s{flex:none;width:22px;text-align:center}
  .shop-item{display:flex;align-items:flex-start;gap:11px;padding:8px 0;font-size:15px;cursor:pointer}
  .shop-item .mini{flex:none;width:28px;height:28px;border-radius:9px;border:2.5px solid var(--line);background:#fff;
    display:flex;align-items:center;justify-content:center;font-size:14px;color:transparent;font-weight:900;margin-top:0}
  .shop-item.done .mini{background:var(--verde);border-color:var(--verde);color:#fff}
  .shop-item.done span{opacity:.4;text-decoration:line-through}
  .cat-h{font-size:12px;letter-spacing:.09em;text-transform:uppercase;color:var(--soft);font-weight:900;margin-top:12px}
  .card-plain{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:16px}
  .barra{height:10px;border-radius:999px;background:var(--line);overflow:hidden;margin-top:8px}
  .barra i{display:block;height:100%;background:var(--verde);border-radius:999px;transition:width .25s}

  /* ===== progreso ===== */
  .w-input-row{display:flex;gap:9px;margin-top:6px}
  .w-input-row input{flex:1;border:2.5px solid var(--line);border-radius:16px;padding:13px;font-size:17px;background:#fff;color:var(--ink);font-family:inherit;font-weight:800}
  .w-input-row input:focus{outline:none;border-color:var(--verde)}
  .w-input-row .btn{width:auto;margin-top:0;padding:13px 20px;background:var(--verde)}
  .w-hist{list-style:none;margin-top:4px}
  .w-hist li{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1.5px dashed var(--line);font-size:15px}
  .w-hist li b{font-variant-numeric:tabular-nums}
  .del{background:none;border:none;color:var(--coral);font-size:13px;cursor:pointer;font-weight:900;font-family:inherit}
  .note{font-size:13px;color:var(--soft);font-weight:700}
  .banner{background:var(--sol-tint);color:#9A6A05;border-radius:16px;padding:11px 14px;font-size:13.5px;margin:0 14px;font-weight:800}
  .hide{display:none!important}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}.confeti{display:none}}
</style>
</head>

const mem = {};
let storageOK = true;
const store = {
  async get(k){
    if(!storageOK) return mem[k] ?? null;
    try{ const r = await window.storage.get(k); return r && r.value ? JSON.parse(r.value) : null; }
    catch(e){ return mem[k] ?? null; }
  },
  async set(k,v){
    mem[k]=v;
    if(!storageOK) return;
    try{ await window.storage.set(k, JSON.stringify(v)); }catch(e){}
  }
};

let S = { days:{}, weights:[], shop:{}, settings:{weekOffset:0} };
let tab = "hoy";
let menuWeekView = null, compraWeekView = null;
let celebrated = false;

const keyOf = d => d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
const todayKey = () => keyOf(new Date());
const dayIndexOf = d => (d.getDay()+6)%7;
const dayIndex = () => dayIndexOf(new Date());
function isoWeek(d){
  const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = (t.getUTCDay()+6)%7;
  t.setUTCDate(t.getUTCDate()-dayNum+3);
  const firstThu = new Date(Date.UTC(t.getUTCFullYear(),0,4));
  return 1+Math.round(((t-firstThu)/86400000-3+((firstThu.getUTCDay()+6)%7))/7);
}
const weekNow = () => ((isoWeek(new Date()) + (S.settings.weekOffset||0)) % 4 + 4) % 4;

function today(){
  const k = todayKey();
  if(!S.days[k]) S.days[k] = {b:false,c:false,n:false,agua:0,ent:false,sup:{}};
  if(!S.days[k].sup) S.days[k].sup = {};
  return S.days[k];
}
const saveDays = () => store.set("cf:days", S.days);

function tasksOf(state, di){
  const arr = [state.b, state.c, state.n, state.agua>=AGUA_META];
  if(ENTRENO[di].entreno) arr.push(state.ent);
  return arr;
}
function isComplete(dateStr){
  const st = S.days[dateStr];
  if(!st) return false;
  const d = new Date(dateStr+"T12:00:00");
  return tasksOf(st, dayIndexOf(d)).every(Boolean);
}
function streak(){
  let n = 0;
  const d = new Date();
  if(!isComplete(keyOf(d))) d.setDate(d.getDate()-1); // hoy aún en curso no rompe la racha
  while(isComplete(keyOf(d))){ n++; d.setDate(d.getDate()-1); }
  return n;
}

  : p<1 ? ["¡Ya casi lo tienes!","Queda muy poquito"]

function heroHTML(){
  const t = today(), di = dayIndex();
  const tasks = tasksOf(t, di);
  const done = tasks.filter(Boolean).length, total = tasks.length, p = done/total;
  const C = 2*Math.PI*44;
  const [m1,m2] = MSGS(p);
  const rk = streak();
  return `<div class="hero ${p===1?"fiesta":""}" id="hero">
    <div class="ring-wrap">
      <svg width="104" height="104" viewBox="0 0 104 104">
        <circle cx="52" cy="52" r="44" fill="none" stroke="${p===1?"rgba(255,255,255,.3)":"var(--line)"}" stroke-width="9"/>
        <circle cx="52" cy="52" r="44" fill="none" stroke="${p===1?"#fff":"var(--verde)"}" stroke-width="9"
          stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${C-C*p}"/>
      </svg>
      <div class="ring-num"><b>${Math.round(p*100)}%</b><small>${done}/${total}</small></div>
    </div>
    <div class="h-txt">
      <div class="h-msg">${m1}</div>
      <div class="h-sub">${m2}</div>
      <span class="racha">🔥 Racha: ${rk} ${rk===1?"día":"días"}</span>
    </div>
  </div>`;
}

/* ---------- PROGRESO ---------- */
function chartSVG(){
  const pts = S.weights.slice(-14);
  if(pts.length<2) return `<p class="note">Registra tu peso un par de veces y aquí verás tu evolución. Con una vez por semana (misma hora, en ayunas) es suficiente. 📉</p>`;
  const W=320,H=150,P=26;
  const vals = pts.map(p=>p.kg);
  let mn = Math.min(...vals,55)-0.5, mx = Math.max(...vals)+0.5;
  const x = i => P + i*(W-2*P)/(pts.length-1);
  const y = v => H-P - (v-mn)*(H-2*P)/(mx-mn);
  const line = pts.map((p,i)=>`${x(i).toFixed(1)},${y(p.kg).toFixed(1)}`).join(" ");
  const dots = pts.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p.kg).toFixed(1)}" r="4" fill="var(--verde)"/>`).join("");
  const yGoal = y(55);
  const goal = (yGoal>P-4 && yGoal<H-P+4) ? `<line x1="${P}" y1="${yGoal}" x2="${W-P}" y2="${yGoal}" stroke="var(--sol)" stroke-dasharray="5 4" stroke-width="2"/><text x="${W-P}" y="${yGoal-6}" text-anchor="end" font-size="10.5" fill="#9A6A05" font-weight="800">objetivo 55</text>` : "";
  const first = pts[0].kg, last = pts[pts.length-1].kg, diff = (last-first).toFixed(1);
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" role="img" aria-label="Evolución del peso">
    <text x="${P-4}" y="${y(mx)+4}" text-anchor="end" font-size="10.5" fill="var(--soft)">${mx.toFixed(1)}</text>
    <text x="${P-4}" y="${y(mn)+4}" text-anchor="end" font-size="10.5" fill="var(--soft)">${mn.toFixed(1)}</text>
    ${goal}
    <polyline points="${line}" fill="none" stroke="var(--verde)" stroke-width="3" stroke-linejoin="round"/>
    ${dots}
  </svg>
  <p class="note" style="text-align:center">${diff<=0?"":"+"}${diff} kg desde el primer registro mostrado</p>`;
}
function viewProgreso(){
  const hist = S.weights.slice().reverse().slice(0,10).map((p,i)=>{
    const realIdx = S.weights.length-1-i;
    const d = new Date(p.d+"T12:00:00");
    return `<li><span>${d.getDate()} ${MESES[d.getMonth()].slice(0,3)}</span><b>${p.kg.toFixed(1)} kg</b><button class="del" data-del="${realIdx}">borrar</button></li>`;
  }).join("");
  main().innerHTML = `
    <div class="card-plain">
      <div class="t-lab-solo">⚖️ Registrar peso</div>
      <div class="w-input-row">
        <input id="w-in" type="number" inputmode="decimal" step="0.1" min="30" max="200" placeholder="kg — ej. 61.4">
        <button class="btn" id="w-add">Guardar</button>
      </div>
      <p class="note" style="margin-top:10px">Mejor 1 vez por semana, en ayunas y a la misma hora. Las fluctuaciones diarias son normales (agua, ciclo, digestión) — lo que importa es la tendencia, no el día a día. 💚</p>
    </div>
    <div class="card-plain"><div class="t-lab-solo">📈 Evolución</div>${chartSVG()}</div>
    ${hist?`<div class="card-plain"><div class="t-lab-solo">🗓 Últimos registros</div><ul class="w-hist">${hist}</ul></div>`:""}`;
  $("#w-add").onclick = async ()=>{
    const v = parseFloat($("#w-in").value.replace(",","."));
    if(!v || v<30 || v>200) return;
    const k = todayKey();
    const existing = S.weights.findIndex(p=>p.d===k);
    existing>=0 ? S.weights[existing].kg=v : S.weights.push({d:k,kg:v});
    S.weights.sort((a,b)=>a.d<b.d?-1:1);
    await store.set("cf:weights", S.weights); render();
  };
  main().querySelectorAll("[data-del]").forEach(b=>b.onclick=async ()=>{
    S.weights.splice(+b.dataset.del,1);
    await store.set("cf:weights", S.weights); render();
  });
}

/* ================= APP ================= */
function render(){
  header();
  if(tab==="hoy") viewHoy();
  else if(tab==="menu") viewMenu();
  else if(tab==="entreno") viewEntreno();
  else if(tab==="compra") viewCompra();
  else viewProgreso();
}
document.querySelectorAll("nav button").forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll("nav button").forEach(x=>x.classList.remove("act"));
    b.classList.add("act");
    tab = b.dataset.tab;
    window.scrollTo({top:0});
    render();
  };
});
(async function init(){
  if(typeof window.storage === "undefined"){ storageOK=false; $("#storage-banner").classList.remove("hide"); }
  S.days = (await store.get("cf:days")) || {};
  S.weights = (await store.get("cf:weights")) || [];
  S.shop = (await store.get("cf:shop")) || {};
  S.settings = (await store.get("cf:settings")) || {weekOffset:0};
  const t = today();
  celebrated = tasksOf(t, dayIndex()).every(Boolean);
  render();
})();
</script>
</body>
</html>
